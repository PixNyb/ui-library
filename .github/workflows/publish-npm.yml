name: Publish UI Library to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Derive package version from tag
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Sync package version
        run: npm version "$PACKAGE_VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm install

      - name: Build distributables
        run: npm run build:all

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
