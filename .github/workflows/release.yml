name: Release UI Library

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Derive package version from tag
        run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Sync package version
        run: npm version "$PACKAGE_VERSION" --no-git-tag-version --allow-same-version

      - name: Generate changelog
        run: npm run changelog -- --tag "$GITHUB_REF_NAME"

      - name: Install dependencies
        run: npm install

      - name: Build distributables
        run: npm run build:all

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            CHANGELOG.md
            dist/ui-library.css
            dist/ui-library.css.map
            dist/ui-library.min.css
            dist/ui-library.min.css.map
          generate_release_notes: true
